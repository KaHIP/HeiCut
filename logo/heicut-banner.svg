<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="glowS" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowT" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="16" fill="url(#bg)"/>

  <!-- Partition glows -->
  <ellipse cx="140" cy="130" rx="120" ry="115" fill="url(#glowS)"/>
  <ellipse cx="340" cy="130" rx="120" ry="115" fill="url(#glowT)"/>

  <!-- Cut line (dashed, vertical) -->
  <line x1="240" y1="20" x2="240" y2="230" stroke="#ef5350" stroke-width="1.8" stroke-dasharray="8,6" opacity="0.5"/>

  <!-- === HYPEREDGE BLOBS (behind nodes) === -->

  <!-- Hyperedge A: fully in S (connects S1, S2, S3) - teal blob -->
  <path d="M 80,60 C 100,30 180,35 185,75 C 190,110 160,145 120,150 C 80,155 55,120 60,85 C 63,70 70,60 80,60 Z"
        fill="#0891b2" fill-opacity="0.12" stroke="#0891b2" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Hyperedge B: fully in S (connects S3, S4) - emerald blob -->
  <path d="M 90,145 C 110,120 180,130 185,165 C 190,200 150,215 110,210 C 70,205 65,175 90,145 Z"
        fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Hyperedge C: CROSSING CUT (connects S2, S4 to T1, T2) - purple blob, dashed -->
  <path d="M 160,80 C 200,45 310,40 340,75 C 365,105 360,155 320,170 C 275,185 210,175 175,145 C 145,120 140,100 160,80 Z"
        fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Hyperedge D: CROSSING CUT (connects S3, S5 to T3, T4) - rose blob, dashed -->
  <path d="M 130,175 C 170,150 290,155 340,185 C 380,210 370,230 320,235 C 260,240 170,230 130,210 C 105,200 110,185 130,175 Z"
        fill="#f43f5e" fill-opacity="0.1" stroke="#f43f5e" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Hyperedge E: fully in T (connects T1, T2, T3) - amber blob -->
  <path d="M 295,60 C 325,35 395,45 400,90 C 405,130 375,165 335,170 C 295,175 270,140 275,100 C 278,75 285,65 295,60 Z"
        fill="#d97706" fill-opacity="0.12" stroke="#d97706" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Hyperedge F: fully in T (connects T3, T4, T5) - indigo blob -->
  <path d="M 310,155 C 340,130 410,140 415,180 C 420,215 385,230 345,225 C 305,220 280,195 290,170 C 295,160 305,155 310,155 Z"
        fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- === S PARTITION NODES (teal/cyan) === -->
  <circle cx="100" cy="65" r="9" fill="#0891b2"/>
  <circle cx="170" cy="85" r="9" fill="#0891b2"/>
  <circle cx="130" cy="140" r="9" fill="#0891b2"/>
  <circle cx="170" cy="170" r="9" fill="#0891b2"/>
  <circle cx="100" cy="195" r="9" fill="#0891b2"/>

  <!-- === T PARTITION NODES (amber/orange) === -->
  <circle cx="310" cy="65" r="9" fill="#d97706"/>
  <circle cx="340" cy="110" r="9" fill="#d97706"/>
  <circle cx="330" cy="165" r="9" fill="#d97706"/>
  <circle cx="380" cy="190" r="9" fill="#d97706"/>
  <circle cx="390" cy="80" r="9" fill="#d97706"/>

  <!-- Ghosted/kernelized nodes -->
  <circle cx="60" cy="130" r="7" fill="none" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
  <circle cx="420" cy="140" r="7" fill="none" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="60" y="134" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" fill="#546e7a" text-anchor="middle" opacity="0.5">&#x2717;</text>
  <text x="420" y="144" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="8" fill="#546e7a" text-anchor="middle" opacity="0.5">&#x2717;</text>

  <!-- === TEXT SECTION === -->

  <!-- Title -->
  <text x="510" y="95" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#e0e0e0" letter-spacing="2">
    <tspan fill="#0891b2">Hei</tspan><tspan fill="#e0e0e0">Cut</tspan>
  </text>

  <!-- Subtitle -->
  <text x="513" y="127" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#90a4ae" letter-spacing="0.5">
    Exact Minimum Cuts in Hypergraphs
  </text>

  <!-- Badge: Part of KaHIP -->
  <rect x="513" y="148" width="130" height="26" rx="13" fill="#263238"/>
  <text x="578" y="165" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#80cbc4" text-anchor="middle">Part of KaHIP</text>

  <!-- Legend -->
  <circle cx="520" cy="210" r="5" fill="#0891b2"/>
  <text x="532" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">S</text>
  <circle cx="560" cy="210" r="5" fill="#d97706"/>
  <text x="572" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">T</text>
  <line x1="600" y1="210" x2="622" y2="210" stroke="#ef5350" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="630" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">min cut</text>
  <path d="M 700,205 C 710,200 720,215 730,210" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="740" y="214" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">hyperedge</text>

  <!-- Bottom text -->
  <text x="240" y="248" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#546e7a" text-anchor="middle">
    FPT kernelization for hypergraph minimum cut
  </text>
</svg>
