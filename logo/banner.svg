<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="500" viewBox="0 0 1800 500">
  <defs>
    <!-- Hyperedge colors -->
    <linearGradient id="cutGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ef4444;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1800" height="500" fill="#ffffff"/>

  <!-- ============================================ -->
  <!-- HYPERGRAPH VISUALIZATION (left side)         -->
  <!-- ============================================ -->

  <!-- Cut line glow region -->
  <rect x="370" y="30" width="60" height="440" fill="url(#cutGlow)"/>

  <!-- Cut line (dashed red) -->
  <line x1="400" y1="40" x2="400" y2="460" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="12,8" opacity="0.7"/>

  <!-- ============================================ -->
  <!-- HYPEREDGE BLOBS (drawn behind nodes)         -->
  <!-- ============================================ -->

  <!-- Hyperedge 1: fully in S partition (teal blob connecting S1, S2, S3) -->
  <path d="M 140,130 C 160,70 280,60 310,110 C 340,160 320,230 260,240 C 200,250 160,230 130,200 C 100,170 120,140 140,130 Z"
        fill="#0ea5e9" fill-opacity="0.15" stroke="#0ea5e9" stroke-opacity="0.4" stroke-width="2"/>

  <!-- Hyperedge 2: fully in S partition (green blob connecting S3, S4, S5) -->
  <path d="M 180,280 C 210,240 310,250 330,300 C 350,350 310,410 250,420 C 190,430 140,390 130,340 C 120,300 150,270 180,280 Z"
        fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.4" stroke-width="2"/>

  <!-- Hyperedge 3: CROSSING the cut (purple blob connecting S2, S4 to T1, T2) -->
  <path d="M 270,140 C 310,90 430,80 510,130 C 560,160 570,220 530,260 C 480,310 370,330 300,300 C 240,270 230,190 270,140 Z"
        fill="#8b5cf6" fill-opacity="0.13" stroke="#8b5cf6" stroke-opacity="0.45" stroke-width="2.5" stroke-dasharray="6,3"/>

  <!-- Hyperedge 4: CROSSING the cut (rose/pink blob connecting S5 to T3, T4) -->
  <path d="M 240,370 C 290,320 420,310 520,340 C 590,360 620,420 580,440 C 530,470 420,470 340,440 C 260,420 210,400 240,370 Z"
        fill="#f43f5e" fill-opacity="0.13" stroke="#f43f5e" stroke-opacity="0.45" stroke-width="2.5" stroke-dasharray="6,3"/>

  <!-- Hyperedge 5: fully in T partition (amber blob connecting T1, T2, T3) -->
  <path d="M 470,120 C 510,80 610,90 640,150 C 660,200 630,270 570,280 C 510,290 450,250 450,190 C 450,150 460,130 470,120 Z"
        fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="2"/>

  <!-- Hyperedge 6: fully in T partition (indigo blob connecting T3, T4, T5) -->
  <path d="M 490,310 C 530,270 640,280 670,330 C 700,380 670,430 620,440 C 560,450 490,420 480,370 C 470,340 475,320 490,310 Z"
        fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.4" stroke-width="2"/>

  <!-- ============================================ -->
  <!-- S PARTITION NODES (teal/cyan)                -->
  <!-- ============================================ -->

  <!-- S1 -->
  <circle cx="160" cy="120" r="18" fill="#0891b2" stroke="#0e7490" stroke-width="2.5"/>
  <text x="160" y="126" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">s1</text>

  <!-- S2 -->
  <circle cx="290" cy="150" r="18" fill="#0891b2" stroke="#0e7490" stroke-width="2.5"/>
  <text x="290" y="156" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">s2</text>

  <!-- S3 -->
  <circle cx="230" cy="230" r="18" fill="#0891b2" stroke="#0e7490" stroke-width="2.5"/>
  <text x="230" y="236" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">s3</text>

  <!-- S4 -->
  <circle cx="300" cy="310" r="18" fill="#0891b2" stroke="#0e7490" stroke-width="2.5"/>
  <text x="300" y="316" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">s4</text>

  <!-- S5 -->
  <circle cx="200" cy="380" r="18" fill="#0891b2" stroke="#0e7490" stroke-width="2.5"/>
  <text x="200" y="386" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">s5</text>

  <!-- ============================================ -->
  <!-- T PARTITION NODES (amber/orange)             -->
  <!-- ============================================ -->

  <!-- T1 -->
  <circle cx="500" cy="130" r="18" fill="#d97706" stroke="#b45309" stroke-width="2.5"/>
  <text x="500" y="136" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">t1</text>

  <!-- T2 -->
  <circle cx="560" cy="230" r="18" fill="#d97706" stroke="#b45309" stroke-width="2.5"/>
  <text x="560" y="236" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">t2</text>

  <!-- T3 -->
  <circle cx="530" cy="340" r="18" fill="#d97706" stroke="#b45309" stroke-width="2.5"/>
  <text x="530" y="346" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">t3</text>

  <!-- T4 -->
  <circle cx="620" cy="410" r="18" fill="#d97706" stroke="#b45309" stroke-width="2.5"/>
  <text x="620" y="416" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">t4</text>

  <!-- T5 -->
  <circle cx="640" cy="160" r="18" fill="#d97706" stroke="#b45309" stroke-width="2.5"/>
  <text x="640" y="166" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">t5</text>

  <!-- ============================================ -->
  <!-- GHOSTED / KERNELIZED NODES                   -->
  <!-- ============================================ -->

  <!-- Ghost node G1 (was near S partition) -->
  <circle cx="90" cy="290" r="14" fill="#0891b2" fill-opacity="0.15" stroke="#0891b2" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="90" y="295" text-anchor="middle" fill="#0891b2" fill-opacity="0.3" font-family="Arial, sans-serif" font-size="11" font-weight="bold">k</text>

  <!-- Ghost node G2 (was near T partition) -->
  <circle cx="680" cy="280" r="14" fill="#d97706" fill-opacity="0.15" stroke="#d97706" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="680" y="285" text-anchor="middle" fill="#d97706" fill-opacity="0.3" font-family="Arial, sans-serif" font-size="11" font-weight="bold">k</text>

  <!-- Ghost node G3 (was near S partition, lower) -->
  <circle cx="120" cy="440" r="14" fill="#0891b2" fill-opacity="0.15" stroke="#0891b2" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="120" y="445" text-anchor="middle" fill="#0891b2" fill-opacity="0.3" font-family="Arial, sans-serif" font-size="11" font-weight="bold">k</text>

  <!-- Faint lines from ghost nodes to nearby real nodes (showing they were connected before kernelization) -->
  <line x1="90" y1="290" x2="200" y2="380" stroke="#0891b2" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="90" y1="290" x2="230" y2="230" stroke="#0891b2" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="120" y1="440" x2="200" y2="380" stroke="#0891b2" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="680" y1="280" x2="560" y2="230" stroke="#d97706" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="680" y1="280" x2="640" y2="160" stroke="#d97706" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Partition labels -->
  <text x="210" y="60" text-anchor="middle" fill="#0891b2" font-family="Arial, sans-serif" font-size="18" font-weight="bold" opacity="0.6">S</text>
  <text x="570" y="60" text-anchor="middle" fill="#d97706" font-family="Arial, sans-serif" font-size="18" font-weight="bold" opacity="0.6">T</text>

  <!-- Cut label -->
  <text x="400" y="485" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-style="italic" opacity="0.6">minimum cut</text>

  <!-- Kernelization annotation -->
  <text x="88" cy="340" y="340" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10" font-style="italic">kernelized</text>

  <!-- Small scissors icon near cut line -->
  <g transform="translate(385, 30)" opacity="0.5">
    <path d="M 10,0 L 18,12 L 14,12 L 20,24 L 16,24 L 22,36 L 8,24 L 12,24 L 6,12 L 10,12 Z" fill="#ef4444" opacity="0.4"/>
  </g>

  <!-- ============================================ -->
  <!-- TEXT SECTION (right side)                    -->
  <!-- ============================================ -->

  <!-- HeiCut title -->
  <text x="1080" y="220" text-anchor="middle" fill="#1e293b" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="120" font-weight="bold" letter-spacing="-2">
    HeiCut
  </text>

  <!-- Subtle underline accent -->
  <line x1="920" y1="240" x2="1240" y2="240" stroke="#0891b2" stroke-width="3" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="1080" y="290" text-anchor="middle" fill="#64748b" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="28" font-weight="400" letter-spacing="1">
    Exact Minimum Cuts in Hypergraphs
  </text>

  <!-- KaHIP badge -->
  <g transform="translate(1020, 360)">
    <rect x="0" y="0" width="120" height="34" rx="17" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="60" y="22" text-anchor="middle" fill="#64748b" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="14" font-weight="600" letter-spacing="0.5">
      Part of KaHIP
    </text>
  </g>

</svg>
